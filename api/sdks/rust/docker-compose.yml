services:
  # go-objstore server (local backend) for integration tests
  objstore-server:
    build:
      context: ../../..
      dockerfile: Dockerfile
      args:
        BUILD_TAGS: local
    command: ["/app/objstore-server", "--quic-self-signed"]
    ports:
      - "18480:8080"    # REST
      - "15451:50051"  # gRPC
      - "14833:4433"    # QUIC
    environment:
      - STORAGE_BACKEND=local
      - STORAGE_PATH=/data
      - LOG_LEVEL=info
      - REST_ENABLED=true
      - GRPC_ENABLED=true
      - QUIC_ENABLED=true
    volumes:
      - objstore-data:/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - objstore-net

  # Rust SDK unit tests: library inline tests (src/*.rs) plus the unit_tests
  # target (type/serde). The integration_* targets require a live server and are
  # intentionally excluded here so the unit suite needs no network.
  rust-unit-tests:
    build:
      context: ../../..
      dockerfile: api/sdks/rust/Dockerfile
    volumes:
      - .:/app
      - cargo-cache:/usr/local/cargo/registry
    command: cargo test --lib --test unit_tests
    networks:
      - objstore-net

  # Rust SDK integration tests: run the integration_* suites against the live
  # server (single-threaded to avoid cross-test races).
  rust-integration-tests:
    build:
      context: ../../..
      dockerfile: api/sdks/rust/Dockerfile
    depends_on:
      objstore-server:
        condition: service_healthy
    environment:
      - OBJSTORE_REST_URL=http://objstore-server:8080
      - OBJSTORE_GRPC_URL=http://objstore-server:50051
      - OBJSTORE_QUIC_URL=https://objstore-server:4433
      - REST_HOST=objstore-server:8080
      - GRPC_HOST=objstore-server:50051
      - QUIC_HOST=objstore-server:4433
    command: cargo test --test integration_comprehensive -- --test-threads=1
    volumes:
      - .:/app
      - cargo-cache:/usr/local/cargo/registry
    networks:
      - objstore-net

  # Rust SDK coverage
  rust-coverage:
    build:
      context: ../../..
      dockerfile: api/sdks/rust/Dockerfile.coverage
    volumes:
      - .:/app
      - cargo-cache:/usr/local/cargo/registry
    command: cargo llvm-cov --lib --test unit_tests --summary-only
    networks:
      - objstore-net

volumes:
  objstore-data:
  cargo-cache:

networks:
  objstore-net:
    driver: bridge
